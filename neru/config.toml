# Neru configuration
# Full config reference: https://github.com/y3owk1n/neru/blob/main/docs/CONFIGURATION.md
# Full CLI reference: https://github.com/y3owk1n/neru/blob/main/docs/CLI.md

[hotkeys]
"Primary+Shift+C" = "__disabled__"
"Primary+Shift+S" = "__disabled__"
"Cmd+Shift+K" = ["action move_mouse --window", "recursive_grid --cursor-selection-mode hold"]
"Cmd+Escape" = ["action move_mouse --window", "recursive_grid --cursor-selection-mode hold"]
"Cmd+J" = ["action move_mouse --window", "scroll"]
"Cmd+Shift+J" = ["action move_mouse --window", "scroll"]

[hints]
hint_characters = "asdfghjklertyuiocvbnm"
include_menubar_hints = true

[hints.hotkeys]
"." = ["idle", "action wait_for_mode_exit", "hints"]
"Space" = "action left_click"
"Shift+J" = ["idle", "action wait_for_mode_exit", "scroll"]

[hints.additional_ax_support]
enable = true
additional_electron_bundles = ["com.hnc.discord"]

[hints.ui]
font_size = 12
font_family = "monaco"

[grid.hotkeys]
"Space" = "action left_click"
"Enter" = "action reset"

[recursive_grid]
grid_cols = 5
grid_rows = 5
keys = "qwertyuiopasdfghjkl;cvbnm"

[recursive_grid.ui]
line_color = "#44000000"
text_color = "#FF111827"
highlight_color = "#11FFFFFF"
font_size = 14

[recursive_grid.hotkeys]
"Shift+S" = ["action move_mouse --selection", "scroll"]
"Shift+J" = ["action move_mouse --selection", "scroll", "action scroll_down"]
"Shift+K" = ["action move_mouse --selection", "scroll", "action scroll_up"]
"Space" = ["action left_click", "action reset"]
"Enter" = "action left_click"
"Tab" = "action reset"
"Ctrl+H" = "action move_mouse_relative --dx=-10 --dy=0"
"Ctrl+J" = "action move_mouse_relative --dx=0 --dy=10"
"Ctrl+K" = "action move_mouse_relative --dx=0 --dy=-10"
"Ctrl+L" = "action move_mouse_relative --dx=10 --dy=0"
"Ctrl+U" = "action page_up"
"Ctrl+D" = "action page_down"
"Ctrl+T" = "action go_top"
"Ctrl+B" = "action go_bottom"
"Ctrl+M" = "action move_mouse"

[virtual_pointer.ui]
size = 2
color = "#FD3300"

[scroll]
scroll_step = 100
scroll_step_half = 700

[scroll.hotkeys]
"." = "recursive_grid --cursor-selection-mode hold"
"r" = "recursive_grid --cursor-selection-mode hold"
"Ctrl+U" = "action page_up"
"Ctrl+D" = "action page_down"
"c" = "action move_mouse --center"
"Shift+C" = ["action move_monitor", "action move_mouse --center"]
"Space" = "action left_click"
"Shift+H" = "action move_mouse_relative --dx=-10 --dy=0"
"Shift+J" = "action move_mouse_relative --dx=0 --dy=10"
"Shift+K" = "action move_mouse_relative --dx=0 --dy=-10"
"Shift+L" = "action move_mouse_relative --dx=10 --dy=0"
"Ctrl+H" = "action move_mouse_relative --dx=-80 --dy=0"
"Ctrl+J" = "action move_mouse_relative --dx=0 --dy=80"
"Ctrl+K" = "action move_mouse_relative --dx=0 --dy=-80"
"Ctrl+L" = "action move_mouse_relative --dx=80 --dy=0"

[smooth_scroll]
enabled = true
steps = 300
max_duration = 300
duration_per_pixel = 20.0

[held_repeat]
enabled = true
